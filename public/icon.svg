<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rounded base -->
  <rect width="512" height="512" rx="128" fill="#181e1a" />
  
  <!-- Outer circular gauge representing mileage track / progression -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#4a654e" stroke-width="8" stroke-dasharray="8 8" opacity="0.4" />
  
  <!-- Odometer arc representing progression -->
  <path d="M 120 320 A 160 160 0 0 1 392 320" fill="none" stroke="#4a654e" stroke-width="12" stroke-linecap="round" opacity="0.5" />
  <path d="M 120 320 A 160 160 0 0 1 320 180" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />

  <!-- Speedometer dashboard needle pointing upwards -->
  <line x1="256" y1="256" x2="310" y2="160" stroke="#4a654e" stroke-width="6" stroke-linecap="round" />

  <!-- Elegant Sleek Minimalist Car Silhouette (placed inside the center/bottom area) -->
  <g transform="translate(146, 210) scale(1.1)">
    <!-- Sleek modern electric car side-profile line -->
    <path d="M 10 70 
             C 25 70, 30 65, 40 50 
             C 55 28, 75 15, 110 15 
             C 135 15, 150 25, 165 42 
             C 180 58, 190 62, 210 65 
             C 218 66, 222 72, 222 80 
             L 222 92
             C 222 96, 218 100, 212 100
             L 190 100
             C 185 85, 165 85, 160 100
             L 70 100
             C 65 85, 45 85, 40 100
             L 15 100
             C 9 100, 5 96, 5 92
             L 5 80
             C 5 74, 8 70, 10 70 Z" 
          fill="#ffffff" />
          
    <!-- Wheels -->
    <circle cx="50" cy="100" r="16" fill="#181e1a" stroke="#ffffff" stroke-width="5" />
    <circle cx="50" cy="100" r="6" fill="#ffffff" />
    
    <circle cx="175" cy="100" r="16" fill="#181e1a" stroke="#ffffff" stroke-width="5" />
    <circle cx="175" cy="100" r="6" fill="#ffffff" />
    
    <!-- Window cutout/accent -->
    <path d="M 60 48 
             C 70 32, 85 24, 108 24 
             C 125 24, 135 30, 145 42 
             L 148 48 
             Z" 
          fill="#181e1a" />
  </g>
  
  <!-- Subtle center-bottom dial pivot accent -->
  <circle cx="256" cy="350" r="16" fill="#4a654e" opacity="0.4" />
</svg>
